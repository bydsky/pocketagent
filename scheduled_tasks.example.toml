# scheduled_tasks.example.toml
#
# Optional. Fires a prompt into a specific channel's existing session on a
# schedule and posts the reply proactively -- e.g. a nightly digest, or a
# biweekly check-in. Reuses that channel's conversation history (via the
# agent's --resume), so it's skipped entirely if the channel has no session
# yet. Repeat [[scheduled_tasks]] for more than one.
#
# Each entry needs:
#   cron = "0 21 * * *"   -- a standard 5-field cron expression (minute hour
#                            day month weekday), evaluated in `timezone` (an
#                            IANA name, or local time if unset). Examples:
#                              "0 21 * * *"    -- every day at 21:00
#                              "0 19 * * 4"    -- every Thursday at 19:00
#                              "0 9 * * 1-5"   -- weekdays at 09:00
#                              "0 0 1 * *"     -- midnight on the 1st of the month
#                            A daily cron naturally pairs with [daily_reset]
#                            in pocketagent.toml: schedule it just before
#                            that channel's reset time so the prompt still
#                            sees that day's conversation before it's cleared.
#
# Optionally also:
#   id = "vocab-summary"  -- a short name/id for this entry (any string). If
#                           omitted, one is auto-generated on each load --
#                           which then won't be stable across restarts/edits,
#                           so set your own if you'll want to refer back to
#                           a specific entry later (e.g. once a remove/list
#                           feature exists). Entries added by an agent via a
#                           schedule-task block always get a real one
#                           persisted at creation time.
#   interval_weeks = 2   -- fire on only every Nth week the cron expression
#                           matches (2 = every other week, etc.); defaults
#                           to 1 (every matching week). Standard cron has no
#                           native "every Nth week" -- this is a bolt-on
#                           filter anchored to a fixed reference date, so
#                           which weeks are "on" stays the same across
#                           restarts.
#
# This file must be named scheduled_tasks.toml and live next to the main
# pocketagent.toml passed via `-c`/`--config`. It's kept separate so it can
# be hot-reloaded on its own without re-reading the main config's platform
# tokens/secrets: the running process polls this file's mtime every 30s and
# automatically reloads its schedules on change -- no signal or restart
# needed. (Contrast with [daily_reset] in pocketagent.toml, which still
# needs a SIGHUP to reload since re-reading that file means re-reading
# secrets too.)

# [[scheduled_tasks]]
# id = "vocab-summary"
# platform = "discord"
# channel_id = "123456789012345678"
# user_id = "234567890123456789"   # whose session to use (sessions are per
                                    # channel+user -- see session_key)
# cron = "0 21 * * *"
# timezone = ""                    # IANA name; omit to use the host's local timezone
# prompt = "Summarize all new vocabulary words discussed in this channel today."

# [[scheduled_tasks]]
# id = "biweekly-status"
# platform = "discord"
# channel_id = "123456789012345678"
# user_id = "234567890123456789"
# cron = "0 19 * * 4"              # every Thursday at 19:00
# interval_weeks = 2               # omit for every week; 2 = every other week
# prompt = "Post the biweekly status update."

# Entries here don't have to be hand-written: an agent can add one itself,
# mid-conversation, by including a fenced ```schedule-task``` block in its
# reply (see core/schedule_requests.py). pocketagent tells the agent about
# this convention automatically, so a user can just say "remind me every day
# at 9am to check the deploy" and the agent will append the equivalent of
# the block above on its own -- with platform/channel_id/user_id always
# taken from that actual conversation, never from anything the agent wrote.
